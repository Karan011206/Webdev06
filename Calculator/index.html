<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Age Calculator</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="w-25 bg-light rounded shadow border mx-auto mt-5">
      <h1 class="text-center mb-3">Age Calculator</h1>

      <form class="d-grid gap-3 justify-content-center">
        <label for="DOB">Enter your date of birth</label>
        <input type="date" name="DOB" id="DOB" />
        <label for="CurrentDate">Choose Current Date</label>
        <input type="date" name="CurrentDate" id="CurrentDate" />
        <button type="submit" class="btn btn-primary">Calculate Age</button>
      </form>
    </div>

    <div class="fw-bold text-center">
      Your age is: <span id="MyAge">xx</span>Years
    </div>

    <script src="script.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
